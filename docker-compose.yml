services:
  # NATS Message Broker with JetStream
  nats:
    image: nats:latest
    container_name: itwatchtower-nats
    ports:
      - "4222:4222"
      - "6222:6222"
      - "8222:8222"
    environment:
      - NATS_URL=nats://0.0.0.0:4222
    command: >
      -c /etc/nats/nats.conf
    volumes:
      - ./infrastructure/nats/nats.conf:/etc/nats/nats.conf
      - nats_data:/data/nats
    networks:
      - itwatchtower
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 10s
      timeout: 5s
      retries: 5

  # VictoriaMetrics for time-series metrics
  victoria-metrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: itwatchtower-vm
    ports:
      - "8428:8428"
    volumes:
      - victoria_metrics_data:/victoria-metrics-data
    command:
      - "-storageDataPath=/victoria-metrics-data"
    networks:
      - itwatchtower
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ClickHouse for structured logs

  clickhouse:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: itwatchtower-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=itwatchtower
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
    networks:
      - itwatchtower
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  metrics-processor:
    build:
      context: .
      dockerfile: backend/services/metrics-processor/Dockerfile
    container_name: metrics-processor
    depends_on:
      - nats
      - victoria-metrics
    networks:
      - itwatchtower
    environment:
      - NODE_ENV=production
      - NATS_URL=nats://nats:4222
      - NATS_USER=processor
      - NATS_PASSWORD=processor-password
      - VICTORIA_METRICS_URL=http://victoria-metrics:8428
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  itwatchtower-agent:
    build:
      context: .
      dockerfile: backend/services/itwatchtower-agent/Dockerfile
    container_name: itwatchtower-agent
    depends_on:
      - nats
    networks:
      - itwatchtower
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_USER=agent
      - NATS_PASSWORD=agent-password
      - AGENT_NAME=docker-agent
      - METRICS_INTERVAL=15s
      - LOGS_INTERVAL=30s
      - LOG_PATHS=/host/var/log/syslog,/host/var/log/messages
      - LOG_TAIL_FROM_START=false
    volumes:
      - /var/log:/host/var/log:ro
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  logs-processor:
    build:
      context: .
      dockerfile: backend/services/logs-processor/Dockerfile
    container_name: logs-processor
    depends_on:
      - nats
      - clickhouse
    networks:
      - itwatchtower
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  alert-engine:
    build:
      context: .
      dockerfile: backend/services/alert-engine/Dockerfile
    container_name: alert-engine
    depends_on:
      - nats
      - clickhouse
    networks:
      - itwatchtower
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend-api:
    build:
      context: .
      dockerfile: backend/services/backend-api/Dockerfile
    container_name: backend-api
    depends_on:
      - nats
      - clickhouse
    networks:
      - itwatchtower
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: backend/services/dashboard/Dockerfile
    container_name: dashboard
    depends_on:
      - backend-api
    networks:
      - itwatchtower
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      - backend-api
    ports:
      - "4000:3000"
    networks:
      - itwatchtower
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  nats_data:
  victoria_metrics_data:
  clickhouse_data:

networks:
  itwatchtower:
    driver: bridge
