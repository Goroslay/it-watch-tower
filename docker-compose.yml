version: '3.8'

services:
  # NATS Message Broker with JetStream
  nats:
    image: nats:latest
    container_name: itwatchtower-nats
    ports:
      - "4222:4222"
      - "6222:6222"
      - "8222:8222"
    environment:
      - NATS_URL=nats://0.0.0.0:4222
    command: >
      -c /etc/nats/nats.conf
      -m 8222
    volumes:
      - ./infrastructure/nats/nats.conf:/etc/nats/nats.conf
      - nats_data:/data/nats
    networks:
      - itwatchtower
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8222/varz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # VictoriaMetrics for time-series metrics
  victoria-metrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: itwatchtower-vm
    ports:
      - "8428:8428"
    volumes:
      - victoria_metrics_data:/victoria-metrics-data
    environment:
      - RETENTION=2160h  # 90 days
    command:
      - "-storageDataPath=/victoria-metrics-data"
      - "-retention=2160h"
    networks:
      - itwatchtower
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ClickHouse for structured logs

  clickhouse:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: itwatchtower-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=itwatchtower
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
    networks:
      - itwatchtower
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  metrics-processor:
    build:
      context: .
      dockerfile: backend/services/metrics-processor/Dockerfile
    container_name: metrics-processor
    depends_on:
      - nats
      - victoria-metrics
    networks:
      - itwatchtower
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  logs-processor:
    build:
      context: .
      dockerfile: backend/services/logs-processor/Dockerfile
    container_name: logs-processor
    depends_on:
      - nats
      - clickhouse
    networks:
      - itwatchtower
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  alert-engine:
    build:
      context: .
      dockerfile: backend/services/alert-engine/Dockerfile
    container_name: alert-engine
    depends_on:
      - nats
      - clickhouse
    networks:
      - itwatchtower
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend-api:
    build:
      context: .
      dockerfile: backend/services/backend-api/Dockerfile
    container_name: backend-api
    depends_on:
      - nats
      - clickhouse
    networks:
      - itwatchtower
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: backend/services/dashboard/Dockerfile
    container_name: dashboard
    depends_on:
      - backend-api
    networks:
      - itwatchtower
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      - backend-api
    ports:
      - "4000:3000"
    networks:
      - itwatchtower
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  nats_data:
  victoria_metrics_data:
  clickhouse_data:

networks:
  itwatchtower:
    driver: bridge
