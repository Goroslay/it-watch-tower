services:
  nats:
    image: nats:latest
    container_name: itwatchtower-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: -c /etc/nats/nats.conf
    volumes:
      - ./infrastructure/nats/nats.conf:/etc/nats/nats.conf
      - nats_data:/data/nats
    networks:
      - itwatchtower
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 10s
      timeout: 5s
      retries: 5

  victoria-metrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: itwatchtower-vm
    ports:
      - "8428:8428"
    volumes:
      - victoria_metrics_data:/victoria-metrics-data
    command:
      - "-storageDataPath=/victoria-metrics-data"
      - "-retentionPeriod=90d"
    networks:
      - itwatchtower
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: itwatchtower-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=itwatchtower
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
    networks:
      - itwatchtower
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  metrics-processor:
    build:
      context: .
      dockerfile: backend/services/metrics-processor/Dockerfile
    container_name: itwatchtower-metrics-processor
    depends_on:
      nats:
        condition: service_healthy
      victoria-metrics:
        condition: service_healthy
    networks:
      - itwatchtower
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NATS_URL=nats://nats:4222
      - NATS_USER=processor
      - NATS_PASSWORD=processor-password
      - VICTORIA_METRICS_URL=http://victoria-metrics:8428

  logs-processor:
    build:
      context: .
      dockerfile: backend/services/logs-processor/Dockerfile
    container_name: itwatchtower-logs-processor
    depends_on:
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - itwatchtower
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NATS_URL=nats://nats:4222
      - NATS_USER=processor
      - NATS_PASSWORD=processor-password
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DB=itwatchtower

  alert-engine:
    build:
      context: .
      dockerfile: backend/services/alert-engine/Dockerfile
    container_name: itwatchtower-alert-engine
    depends_on:
      victoria-metrics:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      backend-api:
        condition: service_healthy
    networks:
      - itwatchtower
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - VICTORIA_METRICS_URL=http://victoria-metrics:8428
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DB=itwatchtower
      - EVAL_INTERVAL_MS=30000
      - BACKEND_API_URL=http://backend-api:3003
      - INTERNAL_SECRET=itwatchtower-internal
      # SLACK_WEBHOOK_URL=https://hooks.slack.com/services/...
      # SMTP_HOST=smtp.gmail.com
      # SMTP_PORT=587
      # SMTP_USER=alerts@empresa.com
      # SMTP_PASS=password
      # SMTP_FROM=IT Watch Tower <alerts@empresa.com>

  backend-api:
    build:
      context: .
      dockerfile: backend/services/backend-api/Dockerfile
    container_name: itwatchtower-backend-api
    depends_on:
      nats:
        condition: service_healthy
      victoria-metrics:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "3003:3003"
    volumes:
      - backend_data:/data
    networks:
      - itwatchtower
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - API_PORT=3003
      - JWT_SECRET=itwatchtower-change-in-prod
      - SQLITE_PATH=/data/itwatchtower.db
      - NATS_URL=nats://nats:4222
      - NATS_USER=api
      - NATS_PASSWORD=api-password
      - VICTORIA_METRICS_URL=http://victoria-metrics:8428
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DB=itwatchtower
      - INTERNAL_SECRET=itwatchtower-internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://192.168.15.168:3003
    container_name: itwatchtower-frontend
    depends_on:
      backend-api:
        condition: service_healthy
    ports:
      - "4000:3000"
    networks:
      - itwatchtower
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  nats_data:
  victoria_metrics_data:
  clickhouse_data:
  backend_data:

networks:
  itwatchtower:
    driver: bridge
