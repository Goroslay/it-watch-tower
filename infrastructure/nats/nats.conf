# NATS Configuration

# Server
server_name: "itwatchtower-nats"
port: 4222

# Clustering
cluster {
  name: "itwatchtower-cluster"
  listen: 0.0.0.0:6222
  routes: [
    nats://nats:6222
  ]
}

# JetStream
jetstream: {
  store_dir: /data/nats
  max_mem_store: 2GB
  max_file_store: 50GB
}

# Admin
admin_port: 8222

# Monitoring
monitor_port: 8222

# Authentication (simple user/pass)
accounts: {
  $SYS: {
    users: [
      { user: "admin", pass: "admin" }
    ]
  }
  users: {
    users: [
      { user: "agent", pass: "agent-password" }
      { user: "processor", pass: "processor-password" }
      { user: "api", pass: "api-password" }
    ]
  }
}

# Default account
default_account: users
