server_name: "itwatchtower-nats"
port: 4222
http_port: 8222

jetstream {
  store_dir: /data/nats
  max_mem_store: 512MB
  max_file_store: 10GB
}

authorization {
  users = [
    {
      user: "admin"
      pass: "admin"
    }
    {
      user: "agent"
      pass: "agent-password"
      permissions: {
        publish: ["metrics.>", "logs.>", "agents.register", "agents.heartbeat", "actions.result.>", "_INBOX.>"]
        subscribe: ["actions.>"]
      }
    }
    {
      user: "processor"
      pass: "processor-password"
      permissions: {
        publish: ["$JS.API.>", "$JS.ACK.>", "metrics.dlq.>", "metrics.dlq", "_INBOX.>"]
        subscribe: ["$JS.API.>", "_INBOX.>", "metrics.>", "logs.>"]
      }
    }
    {
      user: "api"
      pass: "api-password"
      permissions: {
        publish: ["actions.>"]
        subscribe: ["agents.register", "agents.heartbeat", "_INBOX.>"]
      }
    }
  ]
}
