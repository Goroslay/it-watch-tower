server_name: "itwatchtower-nats"
port: 4222
http_port: 8222

jetstream {
  store_dir: /data/nats
  max_mem_store: 512MB
  max_file_store: 10GB
}

authorization {
  users = [
    { user: "admin", pass: "admin" }
    { user: "agent", pass: "agent-password" }
    { user: "processor", pass: "processor-password" }
    { user: "api", pass: "api-password" }
  ]
}
